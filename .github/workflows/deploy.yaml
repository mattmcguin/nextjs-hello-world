name: Build and Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'k8s/**'

jobs:
  build-and-update-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::12}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/mattmcguin/nextjs-hello-world:${{ env.IMAGE_TAG }}
            ghcr.io/mattmcguin/nextjs-hello-world:main

      - name: Update kustomize tag
        run: |
          sed -i "s|newTag: .*|newTag: \"${IMAGE_TAG}\"|" k8s/kustomization.yaml

      - name: Commit and push manifest update
        run: |
          if git diff --quiet; then
            echo "No manifest change detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/kustomization.yaml
          git commit -m "chore(deploy): bump image to ${IMAGE_TAG} [skip ci]"
          git push
